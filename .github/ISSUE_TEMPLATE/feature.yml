name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["kind:feature", "status:triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem should this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
